<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
      <script src="scripts/getdates.js" defer></script>
      <script src="scripts/form.js" defer></script>
      <link rel="stylesheet" href="styles/form.css">
	</head>
	<body>
		<header>
			<h1>Product Review</h1>
		</header>
		<form>
			<fieldset>
				<label
					>Product Name
					<select name="product" id="product">
                  <option value="">Choose a Product...</option>
               </select>
				</label>
			</fieldset>
			<fieldset>
				<label> Overall Rating </label>
				<label>
					<input type="radio" name="rating" value="1star" />
					⭐
				</label>
				<label>
					<input type="radio" name="rating" value="1star" />
					⭐⭐
				</label>
				<label>
					<input type="radio" name="rating" value="1star" />
					⭐⭐⭐
				</label>
				<label>
					<input type="radio" name="rating" value="1star" />
					⭐⭐⭐⭐
				</label>
				<label>
					<input type="radio" name="rating" value="1star" />
					⭐⭐⭐⭐⭐
				</label>
			</fieldset>
			<fieldset>
				<label class="topLabel">
					Date of Installation
					<input type="date" name="installDate" class="boxWidth"/>
				</label>
			</fieldset>
			<fieldset id="features">
				<label id="checkboxes">
					Which features did you find useful in the product?
					<p>(Check all that apply)</p>
					<label>
						<input type="checkbox" name="durability" value="yes" />
						Durability
					</label>
					<label>
						<input type="checkbox" name="ease" value="yes" />
						Ease of Use
					</label>
					<label>
						<input type="checkbox" name="performance" value="yes" />
						Performance
					</label>
					<label>
						<input type="checkbox" name="design" value="yes" />
						Design
					</label>
				</label>
			</fieldset>
			<fieldset>
				<label class="topLabel">
					Written Review<span class="optional">(Optional)</span>
					<textarea name="review" id="review" rows="8" cols="50" class="boxWidth"></textarea>
				</label>
			</fieldset>
			<fieldset>
				<label class="topLabel">
					Your Name<span class="optional">(Optional)</span>
					<textarea name="name" id="name" rows="1" cols="50" class="boxWidth"></textarea>
				</label>
			</fieldset>
			<input type="submit" value="Post Review" id="submit"/>
		</form>
		<footer>
			<p>©<span id="currentyear"></span> 🐻 Brant Martin 🐻 USA</p>
			<p id="lastmodified"></p>
		</footer>
	</body>
</html>
